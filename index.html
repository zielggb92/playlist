/* ═══ BIND & ACT ═══ */
function bind(){
  document.querySelectorAll('#hs [data-action],#vs [data-action]').forEach(el=>el.addEventListener('click',act));
  // Impede que clique nos botões de ação da agenda propague para o container (que abre o evento)
  document.querySelectorAll('.aevc-acts').forEach(el=>el.addEventListener('click',e=>e.stopPropagation()));
  wireEvDrag();
  document.getElementById('modal').onclick=e=>{if(e.target===document.getElementById('modal'))document.getElementById('modal').classList.remove('show')};
  const am=document.getElementById('addmodal');
  if(am)am.onclick=e=>{if(e.target===am)am.classList.remove('show')};
  const epm=document.getElementById('evpickmodal');
  if(epm)epm.onclick=e=>{if(e.target===epm)epm.classList.remove('show')};
  const elm=document.getElementById('evlinkmodal');
  if(elm)elm.onclick=e=>{if(e.target===elm)elm.classList.remove('show')};
  const cii=document.getElementById('custom-img-input');
  if(cii)cii.addEventListener('change',()=>{if(cii.files&&cii.files[0])handleCustomImage(cii.files[0],S.pendingImgTid||'custom')});
  // Busca na home
  const hsi=document.getElementById('home-srch');
  if(hsi){
    hsi.focus();
    // Posiciona o cursor no final do valor atual
    const len=hsi.value.length;
    try{hsi.setSelectionRange(len,len);}catch(e){}
    hsi.addEventListener('input',()=>{
      S.srchQ=hsi.value;
      // Atualiza só os resultados, sem destruir o campo de busca
      const resultsEl=document.getElementById('home-srch-results');
      if(resultsEl){resultsEl.innerHTML=vHomeSearch();resultsEl.querySelectorAll('[data-action]').forEach(el=>el.addEventListener('click',act));}
      else renderContent();
    });
  }
  // Busca no repertório
  const rsi=document.getElementById('rep-srch');
  if(rsi){
    if(!S.repSrchQ){rsi.focus();}
    else{try{rsi.setSelectionRange(rsi.value.length,rsi.value.length);}catch(e){}}
    rsi.addEventListener('input',()=>{
      S.repSrchQ=rsi.value;
      // Atualiza só a lista de resultados, sem destruir o campo de busca
      const resultsEl=document.getElementById('rep-results');
      if(resultsEl){resultsEl.innerHTML=vRepertorioResults();resultsEl.querySelectorAll('[data-action]').forEach(el=>el.addEventListener('click',act));}
      else renderContent();
    });
  }
  // Busca no pick-rep
  const prsi=document.getElementById('pick-rep-srch');
  if(prsi){
    // Não faz focus automático — evita reabrir teclado ao selecionar música
    prsi.addEventListener('input',()=>{
      S.pickRepSrchQ=prsi.value;
      // Atualiza só a lista de resultados, sem destruir o campo de busca
      const resultsEl=document.getElementById('pick-rep-results');
      if(resultsEl){resultsEl.innerHTML=vPickRepResults();resultsEl.querySelectorAll('[data-action]').forEach(el=>el.addEventListener('click',act));}
      else renderContent();
    });
  }
  const cor=document.getElementById('card-op-range');
  if(cor)cor.addEventListener('input',()=>{
    const v=parseInt(cor.value)/100;
    setCardOpacity(v);
    const cv=document.getElementById('card-op-val');if(cv)cv.textContent=cor.value+'%';
  });
  const hor=document.getElementById('home-op-range');
  if(hor)hor.addEventListener('input',()=>{
    const v=parseInt(hor.value)/100;
    setHomeOpacity(v);
    const hv=document.getElementById('home-op-val');if(hv)hv.textContent=hor.value+'%';
  });
  // Seleção de arquivo de áudio local
  const afi=document.getElementById('audio-file-input');
  if(afi)afi.addEventListener('change',()=>{if(afi.files&&afi.files[0]){saveFormDraft();S.pendingAudioFile=afi.files[0];render()}});
  // Seek bind handled globally via document input listener
  // Observações inline por música — textarea multilinha com auto-altura
  document.querySelectorAll('.s-note-inp').forEach(inp=>{
    autoResizeTA(inp);
    inp.addEventListener('input',()=>autoResizeTA(inp));
    inp.addEventListener('blur',()=>{
      const sid=inp.dataset.sid,val=inp.value;
      S.pls=S.pls.map(p=>p.id!==S.aid?p:{...p,songs:p.songs.map(s=>s.id===sid?{...s,note:val}:s)});
      sv(S.pls);
    });
    // Impede que clique na nota acione o expand
    inp.addEventListener('click',e=>e.stopPropagation());
  });
  // Título editável inline
  const ni=document.getElementById('pl-name-input');
  if(ni){
    ni.addEventListener('focus',()=>{const h=ni.nextElementSibling;if(h)h.style.opacity='0'});
    ni.addEventListener('blur',()=>{
      const val=ni.value.trim();
      if(!val){ni.value=S.pls.find(p=>p.id===ni.dataset.id)?.name||'';return}
      S.pls=S.pls.map(p=>p.id===ni.dataset.id?{...p,name:val}:p);
      sv(S.pls);
      // Atualiza header sem re-render completo
      const ht=document.querySelector('.hdr-title');if(ht)ht.textContent=val;
      const h=ni.nextElementSibling;if(h)h.style.opacity='1';
      toast('✅ Título salvo');
    });
    ni.addEventListener('keydown',e=>{if(e.key==='Enter'){ni.blur();e.preventDefault()}});
  }
}
function autoResizeTA(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,400)+'px'}

function saveFormDraft(){
  if(!['new-song','edit-song','new-rep-song','edit-rep-song'].includes(S.view))return;
  if(!S._formDraft)S._formDraft={};
  const ft=document.getElementById('ft');if(ft)S._formDraft.title=ft.value;
  const fa=document.getElementById('fa');if(fa)S._formDraft.artist=fa.value;
  const fm=document.getElementById('fm');if(fm)S._formDraft.moment=fm.value;
  const fl=document.getElementById('fl');if(fl)S._formDraft.link=fl.value;
}
/* ─ Rascunho do formulário de compromisso/evento — evita perder o que foi digitado
   ao trocar de tema (que provoca um re-render da tela) ─ */
function saveEventFormDraft(){
  if(!['new-event','edit-event'].includes(S.view))return;
  if(!S._eventDraft)S._eventDraft={};
  const evn=document.getElementById('evn');if(evn)S._eventDraft.name=evn.value;
  const evd=document.getElementById('evd');if(evd)S._eventDraft.date=evd.value;
  const evt=document.getElementById('evt');if(evt)S._eventDraft.time=evt.value;
  const evl=document.getElementById('evl');if(evl)S._eventDraft.local=evl.value;
}

function act(e){
  const el=e.currentTarget,a=el.dataset.action;
  /* ─ Busca home ─ */
  if(a==='toggle-home-search'){S._homeSearchOpen=!S._homeSearchOpen;if(!S._homeSearchOpen){S.srchQ='';S._srchFilter='';}render();return}
  if(a==='clear-home-search'){S.srchQ='';const i=document.getElementById('home-srch');if(i){i.value='';i.focus();}const r=document.getElementById('home-srch-results');if(r)r.innerHTML=vHomeSearch();else renderContent();return}
  if(a==='srch-filter'){S._srchFilter=el.dataset.f||'';const r=document.getElementById('home-srch-results');if(r){r.innerHTML=vHomeSearch();r.querySelectorAll('[data-action]').forEach(el2=>el2.addEventListener('click',act));}document.querySelectorAll('.srch-filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.f===S._srchFilter));return}
  if(a==='srch-open-rep'){S.view='repertorio';S._repSearchOpen=false;S.repSrchQ='';render();return}
  /* ─ Busca repertório ─ */
  if(a==='toggle-rep-search'){S._repSearchOpen=!S._repSearchOpen;if(!S._repSearchOpen)S.repSrchQ='';render();return}
  if(a==='clear-rep-search'){S.repSrchQ='';const i=document.getElementById('rep-srch');if(i){i.value='';i.focus();}renderContent();return}
  /* ─ Busca pick-rep ─ */
  if(a==='clear-pick-rep-search'){S.pickRepSrchQ='';const i=document.getElementById('pick-rep-srch');if(i){i.value='';i.focus();}renderContent();return}
  if(a==='nav-back'){stopAudio();S.playing=null;S._formDraft={};S._eventDraft=null;navBack();render();return}
  if(a==='go-home'){stopAudio();S.view='home';S.playing=null;S.bgPickFor=null;S._navStack=[];restoreDefaultTheme();render();return}
  if(a==='go-playlists'){stopAudio();S.playing=null;S.view='playlists';S._navStack=[];restoreDefaultTheme();render();return}
  if(a==='go-pl'){S.view='playlist';render();return}
  if(a==='go-themes'){S.view='themes';render();return}
  if(a==='go-new-pl'){S._evForNewPl=null;S.view='new-playlist';render();return}
  if(a==='go-repertorio'){S.view='repertorio';S._repSearchOpen=false;S.repSrchQ='';S._navStack=[];restoreDefaultTheme();render();return}
  if(a==='go-agenda'){S.view='agenda';S._navStack=[];restoreDefaultTheme();render();return}
  if(a==='go-new-event'){S.ee=null;S._newEventTid=null;S._eventDraft=null;S.view='new-event';render();return}
  if(a==='go-new-rep'){S.es=null;S.pk='';S.formCtx='repertorio';S.mediaMode='audio';S.pendingAudioFile=null;S._formDraft={};S.view='new-rep-song';render();return}
  if(a==='fs'){toggleFS();return}
  if(a==='open-backup'){document.getElementById('backupmodal').classList.add('show');return}
  if(a==='close-backupmodal'){document.getElementById('backupmodal').classList.remove('show');return}
  if(a==='do-export-backup'){document.getElementById('backupmodal').classList.remove('show');downloadBackup();return}
  if(a==='do-import-backup'){document.getElementById('backupmodal').classList.remove('show');document.getElementById('backupFileInput').click();return}
  if(a==='ask-screen'){
    if(S.screen){if(S.wt){clearTimeout(S.wt);S.wt=null}if(S.wl){S.wl.release().catch(()=>{});S.wl=null}S.screen=false;toast('🌙 Tela liberada');render();}
    else document.getElementById('modal').classList.add('show');
    return;
  }
  if(a==='open-pl'){navPush();stopAudio();S.aid=el.dataset.id;S.exp=new Set();S.playing=null;S.view='playlist';render();return}
  if(a==='del-pl-h'){
    if(!confirm('Excluir playlist?'))return;
    const pl=S.pls.find(p=>p.id===el.dataset.id);
    pl?.songs.forEach(s=>{if(s.mediaType==='audio')deleteAudio(s.id)});
    S.pls=S.pls.filter(p=>p.id!==el.dataset.id);sv(S.pls);toast('Excluída');render();return;
  }
  if(a==='export-pdf'){exportPDF();return;}
  if(a==='del-pl'){
    if(!confirm('Excluir esta playlist?'))return;
    const pl=S.pls.find(p=>p.id===S.aid);
    pl?.songs.forEach(s=>{if(s.mediaType==='audio')deleteAudio(s.id)});
    stopAudio();
    S.pls=S.pls.filter(p=>p.id!==S.aid);sv(S.pls);S.view='playlists';render();toast('Playlist excluída');return;
  }
  if(a==='clear-pl-audios'){
    const pl=S.pls.find(p=>p.id===S.aid);if(!pl)return;
    const toClear=pl.songs.filter(s=>s.mediaType==='audio');
    if(!toClear.length){toast('Nenhum áudio pra remover');return}
    if(!confirm(`Remover o áudio de ${toClear.length} música(s) desta playlist? As músicas continuam na lista, só sem o arquivo de áudio.`))return;
    (async()=>{
      for(const s of toClear){await deleteAudio(s.id);s.mediaType='';s.audioName='';}
      sv(S.pls);
      if(S.playing&&toClear.some(s=>s.id===S.playing)){stopAudio()}
      render();toast('Áudios removidos! ✅');
    })();
    return;
  }
  /* ─ AGENDA: compromissos ─ */
  if(a==='open-event'){
    const ev=S.events.find(x=>x.id===el.dataset.id);if(!ev)return;
    navPush();
    S.activeEventId=ev.id;
    // Aplica o tema do evento sem sobrescrever o tema geral (save=false)
    if(ev.tid&&TH[ev.tid])applyTheme(ev.tid,false);
    else applyTheme(S.tid,false);
    _lastRenderedTid=ev.tid||S.tid;
    if(ev.plId&&S.pls.find(p=>p.id===ev.plId)){
      stopAudio();S.aid=ev.plId;S.exp=new Set();S.playing=null;S.view='playlist';render();
    }else{
      S.ee=ev.id;S._eventDraft=null;S.view='edit-event';render();
    }
    return;
  }
  if(a==='set-event-theme'){
    const evid=el.dataset.evid,tid=el.dataset.tid||null;
    saveEventFormDraft();
    if(evid==='__new__'){
      /* Novo evento ainda não salvo: guarda apenas no estado temporário */
      S._newEventTid=tid||null;
      if(tid&&TH[tid])applyTheme(tid,false);  // aplica sem salvar em S.tid
      else applyTheme(S.tid,false);           // volta pro padrão sem salvar
      toast(tid?'🎨 Tema selecionado':'Padrão do app');
      render();return;
    }
    S.events=S.events.map(x=>x.id===evid?{...x,tid}:x);svAgenda(S.events);
    // Aplica visual do evento sem sobrescrever o tema geral do app (save=false)
    if(tid&&TH[tid])applyTheme(tid,false);
    else applyTheme(S.tid,false);
    _lastRenderedTid=null; // força re-avaliação no próximo render
    toast(tid?'🎨 Tema salvo neste compromisso':'Voltou a usar o tema padrão');
    render();return;
  }
  if(a==='edit-event-h'){
    navPush();
    const ev=S.events.find(x=>x.id===el.dataset.id);
    if(ev){
      S.activeEventId=ev.id;
      if(ev.tid&&TH[ev.tid])applyTheme(ev.tid,false);
      else applyTheme(S.tid,false);
      _lastRenderedTid=ev.tid||S.tid;
    }
    S.ee=el.dataset.id;S._eventDraft=null;S.view='edit-event';render();return;
  }
  if(a==='agenda-tab'){
    S.agendaTab=el.dataset.tab==='archived'?'archived':'active';
    render();return;
  }
  if(a==='archive-event'){
    S.events=S.events.map(x=>x.id===el.dataset.id?{...x,archived:true}:x);svAgenda(S.events);
    if(S.view==='edit-event'){S.view='agenda';S.agendaTab='archived';}
    toast('📦 Arquivado');render();return;
  }
  if(a==='restore-event'){
    S.events=S.events.map(x=>x.id===el.dataset.id?{...x,archived:false}:x);svAgenda(S.events);
    if(S.view==='edit-event'){S.view='agenda';S.agendaTab='active';}
    toast('↩️ Restaurado pra Ativos');render();return;
  }
  if(a==='del-event'){
    if(!confirm('Excluir este compromisso?'))return;
    S.events=S.events.filter(x=>x.id!==el.dataset.id);svAgenda(S.events);toast('Excluído');render();return;
  }
  if(a==='save-event'){
    const name=document.getElementById('evn')?.value.trim();
    const date=document.getElementById('evd')?.value||'';
    const time=document.getElementById('evt')?.value||'';
    const local=document.getElementById('evl')?.value.trim()||'';
    if(!name){alert('Digite o nome do compromisso');return}
    if(S.view==='edit-event'){
      const curEv=S.events.find(x=>x.id===S.ee)||{};
      const tid=curEv.tid||null;
      S.events=S.events.map(x=>x.id===S.ee?{...x,name,date,time,local,tid}:x);toast('Atualizado!');
    }else{
      const ev={id:uid(),name,date,time,local,plId:null,tid:S._newEventTid||null};S.events=[...S.events,ev];S._newEventTid=null;toast('Compromisso criado!');
    }
    svAgenda(S.events);S._eventDraft=null;S.view='agenda';render();return;
  }
  /* ─ vínculo evento ↔ playlist ─ */
  if(a==='close-evpickmodal'){document.getElementById('evpickmodal').classList.remove('show');S.view='playlist';render();return}
  if(a==='link-pl-to-event'){
    const evid=el.dataset.evid,plid=el.dataset.plid;
    S.events=S.events.map(x=>x.id===evid?{...x,plId:plid}:x);svAgenda(S.events);
    document.getElementById('evpickmodal').classList.remove('show');
    toast('✅ Playlist salva no compromisso!');S.view='playlist';render();return;
  }
  if(a==='create-event-for-pl'){
    const plid=el.dataset.plid;
    const pl=S.pls.find(p=>p.id===plid);
    const ev={id:uid(),name:pl?pl.name:'',date:'',local:'',plId:plid};
    S.events=[...S.events,ev];svAgenda(S.events);
    document.getElementById('evpickmodal').classList.remove('show');
    S.ee=ev.id;S._eventDraft=null;S.view='edit-event';render();return;
  }
  if(a==='open-pl-from-event'){
    navPush();
    const ev=S.events.find(x=>x.id===S.ee);
    if(ev){
      S.activeEventId=ev.id;
      if(ev.tid&&TH[ev.tid])applyTheme(ev.tid,false);
      else applyTheme(S.tid,false);
      _lastRenderedTid=ev.tid||S.tid;
    }
    stopAudio();S.aid=el.dataset.id;S.exp=new Set();S.playing=null;S.view='playlist';render();return;
  }
  if(a==='unlink-event-pl'){
    const evid=el.dataset.id;
    S.events=S.events.map(x=>x.id===evid?{...x,plId:null}:x);svAgenda(S.events);
    toast('Playlist desvinculada');render();return;
  }
  if(a==='new-pl-for-event'){
    const evid=el.dataset.id;
    S.formCtx='playlist';S._evForNewPl=evid;
    S.view='new-playlist';render();return;
  }
  if(a==='link-existing-pl'){
    openEventLinkModal(el.dataset.id);return;
  }
  if(a==='close-evlinkmodal'){document.getElementById('evlinkmodal').classList.remove('show');return}
  if(a==='confirm-link-pl'){
    const evid=el.dataset.evid,plid=el.dataset.plid;
    S.events=S.events.map(x=>x.id===evid?{...x,plId:plid}:x);svAgenda(S.events);
    document.getElementById('evlinkmodal').classList.remove('show');
    toast('✅ Playlist vinculada!');render();return;
  }
  if(a==='rep-skip'){skipRepSong(parseInt(el.dataset.dir||'1'));return;}
  if(a==='rep-toggle-transport'){
    const ap=document.getElementById('audio-player');if(!ap)return;
    if(S.repPlaying){
      if(ap.paused){if(S._audioCtx&&S._audioCtx.state==='suspended')S._audioCtx.resume();ap.play().catch(()=>{});}
      else ap.pause();
    }else{skipRepSong(1);}
    return;
  }
  if(a==='rep-toggle-player-ui'){
    S.repPlayerCollapsed=!S.repPlayerCollapsed;
    try{localStorage.setItem('slp7repcollapsed',S.repPlayerCollapsed?'1':'0')}catch(e){}
    render();return;
  }
  if(a==='rep-toggle-skipmode'){
    S.repSkipMode=S.repSkipMode==='random'?'seq':'random';
    S._repShuffleOrder=null;
    toast(S.repSkipMode==='random'?'🔀 Aleatório':'➡️ Sequência');
    render();return;
  }
  if(a==='rep-close-player'){
    S.playing=null;
    stopAudio();
    render();
    return;
  }
  if(a==='rep-play'||a==='rep-toggle-play'){
    const id=el.dataset.id||S.repPlaying;if(!id)return;
    const s=S.rep.find(x=>x.id===id);if(!s)return;
    if(!s.mediaType||s.mediaType==='link'){toast('Sem arquivo de áudio');return;}
    // Para música de playlist
    if(S.playing){S.playing=null;}
    startRepPlaying(id);
    return;
  }
  if(a==='play'){
    const id=el.dataset.id,pl=S.pls.find(p=>p.id===S.aid),s=pl?.songs.find(s=>s.id===id);
    if(!s)return;
    const hasMedia=!!(s.link&&s.link.trim())||s.mediaType==='audio';
    if(!hasMedia){toast('Sem mídia cadastrada');return}
    if(S.playing===id){S.playing=null;stopAudio();render();return}
    startPlaying(id);
    return;
  }
  if(a==='skip-next'){skipSong(1);return}
  if(a==='skip-prev'){skipSong(-1);return}
  if(a==='toggle-player-ui'){
    S.playerCollapsed=!S.playerCollapsed;
    try{localStorage.setItem('slp7playercollapsed',S.playerCollapsed?'1':'0')}catch(e){}
    render();return;
  }
  if(a==='toggle-play'){
    if(!S.playing){skipSong(1);return} // nada selecionado: começa a tocar
    const pl=S.pls.find(p=>p.id===S.aid),s=pl?.songs.find(x=>x.id===S.playing);
    if(s&&s.mediaType==='audio'){
      const ap=document.getElementById('audio-player');
      if(ap){if(ap.paused)ap.play().catch(()=>{});else ap.pause();}
      render();
    }else{
      S.playing=null;stopAudio();render();
    }
    return;
  }
  if(a==='toggle-skipmode'){
    S.skipMode=S.skipMode==='random'?'seq':'random';
    try{localStorage.setItem('slp7skipmode',S.skipMode)}catch(e){}
    toast(S.skipMode==='random'?'🔀 Modo aleatório':'➡️ Modo sequência');
    render();return;
  }
  if(a==='chk'){
    const id=el.dataset.id;
    S.pls=S.pls.map(p=>p.id!==S.aid?p:{...p,songs:p.songs.map(s=>s.id===id?{...s,done:!s.done}:s)});
    sv(S.pls);
    const pl=S.pls.find(p=>p.id===S.aid),s=pl.songs.find(s=>s.id===id);
    const card=document.getElementById('sc-'+id);
    if(card){card.classList.toggle('done',s.done);updProg(pl);}
    return;
  }
  if(a==='exp'){
    const id=el.dataset.id;S.exp.has(id)?S.exp.delete(id):S.exp.add(id);
    const more=document.querySelector('#sc-'+id+' .s-more');
    const opening=S.exp.has(id);
    more?.classList.toggle('open',opening);
    el.textContent=opening?'▲':'▼';
    if(opening){const ta=more?.querySelector('.s-note-inp');if(ta)autoResizeTA(ta);}
    return;
  }
  if(a==='edit-s'){
    const id=el.dataset.id,pl=S.pls.find(p=>p.id===S.aid);
    S.es={...pl.songs.find(s=>s.id===id)};S.pk=S.es.key||'';
    S.formCtx='playlist';S.mediaMode=S.es.mediaType==='audio'?'audio':'link';S.pendingAudioFile=null;S._formDraft={};
    S.view='edit-song';render();return;
  }
  if(a==='edit-rep'){
    const id=el.dataset.id;
    S.es={...S.rep.find(s=>s.id===id)};S.pk=S.es.key||'';
    S.formCtx='repertorio';S.mediaMode=S.es.mediaType==='audio'?'audio':'link';S.pendingAudioFile=null;S._formDraft={};
    S.view='edit-rep-song';render();return;
  }
  if(a==='del-s'){
    if(!confirm('Excluir música?'))return;
    const id=el.dataset.id,pl=S.pls.find(p=>p.id===S.aid),song=pl?.songs.find(s=>s.id===id);
    if(song?.mediaType==='audio')deleteAudio(id);
    if(S.playing===id){S.playing=null;stopAudio();}
    S.pls=S.pls.map(p=>p.id!==S.aid?p:{...p,songs:p.songs.filter(s=>s.id!==id)});
    sv(S.pls);toast('Excluída');S.view='playlist';render();return;
  }

function updProg(pl){

/* ─ Seek listener (com suporte A-B) ─ */
document.addEventListener('input',e=>{
  const t=e.target;
  if(t&&t.id==='mp-seek'){
    const ap=document.getElementById('audio-player');
    if(!ap||!ap.duration)return;
    const newTime=(parseFloat(t.value)/100)*ap.duration;
    ap.currentTime=newTime;
    // Se A-B ativo e usuário arrastou para fora do range, limpa loop temporariamente
    if(S.audioAB.a!==null&&S.audioAB.b!==null){
      if(newTime<S.audioAB.a||newTime>S.audioAB.b){stopABLoop();setTimeout(startABLoop,200);}
    }
  }
});

/* ─ Teclado: Espaço = play/pause, ←/→ = marcadores ─ */
document.addEventListener('keydown',e=>{
  // Ignora se estiver em input/textarea
  if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))return;
  const ap=document.getElementById('audio-player');if(!ap)return;
  if(e.key===' '||e.code==='Space'){
    e.preventDefault();
    if(ap.paused){if(S._audioCtx&&S._audioCtx.state==='suspended')S._audioCtx.resume();ap.play().catch(()=>{});}
    else ap.pause();
  }else if(e.key==='ArrowLeft'){
    e.preventDefault();
    const marks=S.audioMarks;
    if(marks.length){
      const cur=ap.currentTime;
      const prev=[...marks].reverse().find(m=>m.t<cur-0.3);
      if(prev)ap.currentTime=prev.t;else ap.currentTime=marks[marks.length-1].t;
    }else ap.currentTime=Math.max(0,ap.currentTime-10);
  }else if(e.key==='ArrowRight'){
    e.preventDefault();
    const marks=S.audioMarks;
    if(marks.length){
      const cur=ap.currentTime;
      const next=marks.find(m=>m.t>cur+0.3);
      if(next)ap.currentTime=next.t;else ap.currentTime=marks[0].t;
    }else ap.currentTime=Math.min(ap.duration||0,ap.currentTime+10);
  }
});

   comportamento da setinha do cabeçalho). Só pergunta se quer sair quando
   já está na tela inicial. ─ */
function closeOpenModal(){
  const ids=['evpickmodal','evlinkmodal','addmodal','modal'];

}
(function setupExitGuard(){
  // garante que sempre haja uma entrada extra no histórico para "capturar" o botão voltar
  history.pushState({slpGuard:true},'');
  window.addEventListener('popstate',()=>{
    if(closeOpenModal()){history.pushState({slpGuard:true},'');return}
    if(S.view==='home'){
      if(confirm('Sair do aplicativo?')){
        history.go(-2); // deixa o navegador concluir a saída/voltar de fato
      }else{
        history.pushState({slpGuard:true},''); // recoloca a barreira
      }
      return;
    }
    act({currentTarget:{dataset:{action:backActionFor()}}});
    history.pushState({slpGuard:true},''); // recoloca a barreira pra capturar o próximo "voltar"
  });
})();

/* ═══ ARMAZENAMENTO PERSISTENTE ═══
   Pede ao navegador pra NÃO limpar o IndexedDB (onde ficam os áudios) sob
   pressão de espaço no aparelho. Sem isso, o Android pode descartar os
   áudios automaticamente mesmo com o app instalado, mantendo só os dados
   pequenos do localStorage (nome, tom, letra) — por isso o áudio "desaparece"
   mas a referência continua lá. */
if(navigator.storage&&navigator.storage.persist){
  navigator.storage.persisted().then(already=>{
    if(!already){
      navigator.storage.persist().then(granted=>{
        console.log(granted?'✅ Armazenamento persistente concedido':'⚠️ Armazenamento persistente NEGADO pelo navegador');
      }).catch(e=>console.warn('storage.persist falhou',e));
    }
  }).catch(e=>console.warn('storage.persisted falhou',e));
}

/* ═══ MODO APRESENTAÇÃO ═══ */
function presOpen(){
  const p=S.pls.find(x=>x.id===S.aid);
  if(!p||!p.songs.length)return;
  S._presMode=true;
  S._presIdx=0;
  // Começa na música atual se houver
  if(S.playing){const i=p.songs.findIndex(s=>s.id===S.playing);if(i>=0)S._presIdx=i;}
  presRender();
  document.getElementById('pres-overlay').classList.remove('hidden');
  // Bloqueia scroll do app
  document.body.style.overflow='hidden';
  // Swipe
  presBindSwipe();
}
function presClose(){
  document.getElementById('pres-overlay').classList.add('hidden');
  document.body.style.overflow='';
  S._presMode=false;
}
function presRender(){
  const p=S.pls.find(x=>x.id===S.aid);if(!p)return;
  const songs=p.songs;
  const i=S._presIdx;
  const s=songs[i];if(!s)return;
  const t=TH[activeTid()]||TH.casamento;

  // Fundo do tema
  const bg=document.getElementById('pres-bg');
  if(bg)bg.style.backgroundImage=`url('${t.img}')`;

  // Título e info
  document.getElementById('pres-num').textContent=`${i+1}`;
  const mom=document.getElementById('pres-moment');
  mom.textContent=s.moment||'';mom.style.display=s.moment?'':'none';
  document.getElementById('pres-title').textContent=s.title||'';
  document.getElementById('pres-title').style.fontFamily=t.hf||'Inter';
  const art=document.getElementById('pres-artist');
  art.textContent=s.artist||'';art.style.display=s.artist?'':'none';
  const key=document.getElementById('pres-key');
  key.textContent=s.key||'';key.style.display=s.key?'':'none';
  const note=document.getElementById('pres-note');
  note.textContent=s.note||'';note.style.display=s.note?'':'none';

  // Counter
  document.getElementById('pres-counter').textContent=`${i+1} / ${songs.length}`;

  // Botão concluído
  const chk=document.getElementById('pres-chk');
  chk.textContent=s.done?'✓ Concluída':'Concluir';
  chk.classList.toggle('done',!!s.done);

  // Navegação
  document.getElementById('pres-prev').disabled=i===0;
  document.getElementById('pres-next').disabled=i===songs.length-1;

  // Dots (max 9)
  const dotsEl=document.getElementById('pres-dots');
  const maxDots=Math.min(songs.length,9);
  const offset=songs.length>9?Math.max(0,Math.min(i-4,songs.length-9)):0;
  dotsEl.innerHTML=Array.from({length:maxDots},(_,d)=>{
    const si=d+offset;
    const active=si===i;
    const done=songs[si]&&songs[si].done;
    return`<div class="pres-dot${active?' active':''}${done&&!active?' done-dot':''}"></div>`;
  }).join('');
}
function presGo(idx){
  const p=S.pls.find(x=>x.id===S.aid);if(!p)return;
  S._presIdx=Math.max(0,Math.min(idx,p.songs.length-1));
  presRender();
}
function presToggleDone(){
  const p=S.pls.find(x=>x.id===S.aid);if(!p)return;
  const s=p.songs[S._presIdx];if(!s)return;
  s.done=!s.done;
  S.pls=S.pls.map(pl=>pl.id===p.id?{...pl,songs:pl.songs.map(x=>x.id===s.id?{...x,done:s.done}:x)}:pl);
  sv(S.pls);
  presRender();
  // Avança automaticamente se concluiu e não é a última
  if(s.done&&S._presIdx<p.songs.length-1){
    setTimeout(()=>presGo(S._presIdx+1),400);
  }
}
function presBindSwipe(){
  const el=document.getElementById('pres-overlay');
  let sx=0,sy=0;
  el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
  el.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx;
    const dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){
      if(dx<0)presGo(S._presIdx+1);else presGo(S._presIdx-1);
    }
  },{passive:true});
}
// Bind dos botões do overlay (uma vez no init)
(function(){
  document.getElementById('pres-close').addEventListener('click',presClose);
  document.getElementById('pres-chk').addEventListener('click',presToggleDone);
  document.getElementById('pres-prev').addEventListener('click',()=>presGo(S._presIdx-1));
  document.getElementById('pres-next').addEventListener('click',()=>presGo(S._presIdx+1));
  // Teclas teclado (desktop)
  document.addEventListener('keydown',e=>{
    if(!S._presMode)return;
    if(e.key==='ArrowRight'||e.key==='ArrowDown')presGo(S._presIdx+1);
    if(e.key==='ArrowLeft'||e.key==='ArrowUp')presGo(S._presIdx-1);
    if(e.key==='Enter'||e.key===' ')presToggleDone();
    if(e.key==='Escape')presClose();
  });
})();

</script>
